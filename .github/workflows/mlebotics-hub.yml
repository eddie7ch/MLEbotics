name: Python CI - mlebotics-hub

on:
  push:
    paths:
      - "mlebotics-hub/**"
  pull_request:
    paths:
      - "mlebotics-hub/**"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install pyinstaller pillow python-dotenv requests
      - name: Syntax check
        run: python -m py_compile mlebotics-hub/hub.py
